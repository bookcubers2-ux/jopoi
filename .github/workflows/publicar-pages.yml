# Publica la carpeta plataforma/ en GitHub Pages en cada push a main.
# Así toda organización que haga fork tiene su instancia en línea gratis
# sin instalar nada: solo activar Pages en los ajustes del repositorio.
name: Publicar en GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publicar:
    environment:
      name: github-pages
      url: ${{ steps.despliegue.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: plataforma
      - id: despliegue
        uses: actions/deploy-pages@v4
